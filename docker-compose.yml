services:
  server:
    build: .
    command: python -u src/server.py
    environment:
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=5000
      - FORWARD_HOST=receiver
      - FORWARD_PORT=5001
    networks:
      - udp-network
    depends_on:
      - receiver

  sender:
    build: .
    command: python -u src/sender.py
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=5000
      - SEND_INTERVAL=1.0
    networks:
      - udp-network
    depends_on:
      - server

  receiver:
    build: .
    command: python -u src/receiver.py
    environment:
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=5001
    networks:
      - udp-network

  test:
    build: .
    command: python -m pytest tests/test_system.py -v -s
    networks:
      - udp-network
    depends_on:
      - sender
      - server
      - receiver

networks:
  udp-network:
    driver: bridge
