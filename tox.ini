[tox]
envlist = format,lint,typecheck,docker
skipsdist = True

[testenv:format]
description = Check code formatting with ruff
deps = ruff>=0.8.0
commands =
    ruff format --check src/ tests/
    ruff check src/ tests/

[testenv:lint]
description = Run pylint on source code
deps =
    pylint>=3.0.0
commands =
    pylint src/ tests/

[testenv:typecheck]
description = Run mypy type checking
deps =
    mypy>=1.0.0
commands =
    mypy src/ tests/

[testenv:docker]
description = Run Docker Compose system tests
allowlist_externals =
    docker
    sleep
    echo
passenv = 
    DOCKER_*
    COMPOSE_*
commands_pre =
    echo "Building and starting services..."
    docker compose up --build -d sender server receiver
    echo "Waiting for services to stabilize..."
    sleep 3
commands =
    echo "Running tests..."
    docker compose run --rm test
commands_post =
    echo "Cleaning up..."
    docker compose down

[testenv:all]
description = Run all checks sequentially
deps =
    {[testenv:format]deps}
    {[testenv:lint]deps}
    {[testenv:typecheck]deps}
allowlist_externals = {[testenv:docker]allowlist_externals}
passenv = {[testenv:docker]passenv}
commands =
    {[testenv:format]commands}
    {[testenv:lint]commands}
    {[testenv:typecheck]commands}
    {[testenv:docker]commands_pre}
    {[testenv:docker]commands}
    {[testenv:docker]commands_post}
