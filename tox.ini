[tox]
envlist = py314,format,lint,typecheck
skipsdist = False

[testenv]
description = Run unit tests with pytest
deps = pytest>=8.0.0
commands = pytest tests -v

[testenv:py314]
description = Run unit tests on Python 3.14
deps = {[testenv]deps}
commands = {[testenv]commands}

[testenv:format]
description = Check code formatting with ruff
deps = ruff>=0.8.0
commands =
    ruff format --check src/ tests/
    ruff check src/ tests/

[testenv:lint]
description = Run pylint on source code
deps =
    pylint>=3.0.0
    pytest>=8.0.0
commands = pylint src/ tests/

[testenv:typecheck]
description = Run mypy type checking
deps =
    mypy>=1.0.0
    pytest>=8.0.0
commands = mypy src/ tests/

[testenv:docker]
description = Run Docker Compose integration tests
allowlist_externals =
    docker
    sleep
commands_pre =
    docker compose up --build -d sender server receiver dlr
    sleep 3
commands =
    docker compose run --rm test
commands_post =
    docker compose down -v
